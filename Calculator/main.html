<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <div class="container">
            <div class="calculator">
                <div class="head">
                    &#9776;
                    <h2>
                        Standard
                    </h2>
                    <img class="icon" src="icon.png" alt="">
                </div>
                <input id="display" class="display" readonly>


                <div class="div-small">
                    <button class="top-btns unactive">MC</button>
                    <button class="top-btns unactive">MR</button>
                    <button class="top-btns">M+</button>
                    <button class="top-btns">M-</button>
                    <button class="top-btns">MS</button>
                </div>

                <div class="keypad">



                    <button onclick="append('%')" class="btn btn-op btn-mod">%</button>
                    <button class="btn btn-op btn-CE">CE</button>
                    <button class="btn btn-op btn-clear" id="btn-clear">C</button>
                    <button onclick="del()" class="btn btn-op btn-del">&#x232B;</button>


                    <button onclick="fraction()" class="btn btn-op btn-1">1/x</button>
                    <button onclick="sqr()" class="btn btn-op btn-sqr">x<sup>2</sup></button>
                    <button onclick="sqrt()" class="btn btn-op btn-sqrt"><sup>2</sup>&radic;x</button>
                    <button onclick="append('/') " class="btn btn-op btn-divide">/</button>


                    <button onclick="append('7')" class="btn btn-num btn-7">7</button>
                    <button onclick="append('8')" class="btn btn-num btn-8">8</button>
                    <button onclick="append('9')" class="btn btn-num btn-9">9</button>
                    <button onclick="append('*')" class="btn btn-op btn-multi">x</button>

                    <button onclick="append('4')" class="btn btn-num btn-4">4</button>
                    <button onclick="append('5')" class="btn btn-num btn-5">5</button>
                    <button onclick="append('6')" class="btn btn-num btn-6">6</button>
                    <button onclick="append('-')" class="btn btn-op btn-subtract">-</button>
                    
                    <button onclick="append('1')" class="btn btn-num btn-1">1</button>
                    <button onclick="append('2')" class="btn btn-num btn-2">2</button>
                    <button onclick="append('3')" class="btn btn-num btn-3">3</button>
                    <button onclick="append('+')" class="btn btn-op btn-add">+</button>

                    <button class="btn btn-num btn-toggle-sign">+/-</button>
                    <button onclick="append('0')" class="btn btn-num btn-0">0</button>
                    <button onclick="append('.')" class="btn btn-num btn-dot">.</button>
                    <button onclick="calculate()" class="btn btn-equals">=</button>

                </div>

            </div>
            <div class="history">
                <!-- <h2>History</h2>
                <div class="list" id="list">
                    <ul id="items"></ul>
                </div>
                <button onclick="clearHistory()" class="clear-history">Clear History</button> -->
            
                <div class="tabs">
                    <button class="tab active-tab" onclick="switchTab('tab1',this)">History</button>
                    <button class="tab" onclick="switchTab('tab2' , this)">Memory</button>
                </div>


                <div class="tab-contents">

                    <div id="tab1" class="tab-content active-content">
                        <div class="list" id="list">
                            <ul id="items"></ul>
                        </div>
                    </div>

                    <div id="tab2" class="tab-content hidden">
                        <p>There is no memory yet.</p>
                    </div>
                </div>



                    
            </div>
        </div>
        <script src="script.js"></script>
    </main>


</body>

</html>
